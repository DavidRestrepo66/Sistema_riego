{% extends "auth_base.html" %}
{% block title %}Iniciar sesión{% endblock %}

{% block auth_content %}
  <h2>Bienvenido de vuelta</h2>
  <p class="lead">Ingresa tus credenciales para acceder al panel.</p>

  <form method="POST" action="{{ url_for('auth.login') }}">
    <div class="form-field">
      <label class="form-label" for="email">Correo</label>
      <input class="form-input" id="email" type="email" name="email"
             placeholder="tu@correo.com" autocomplete="email" required>
    </div>

    <div class="form-field">
      <label class="form-label" for="password">Contraseña</label>
      <input class="form-input" id="password" type="password" name="password"
             placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <button class="btn btn-primary btn-lg btn-full" type="submit" style="margin-top:6px;">
      Iniciar sesión
    </button>
  </form>

  <p class="footer-link">
    ¿No tienes cuenta?
    <a href="{{ url_for('auth.registro') }}">Regístrate aquí</a>
  </p>
{% endblock %}
