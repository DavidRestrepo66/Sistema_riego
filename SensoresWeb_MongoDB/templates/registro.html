<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">

    <title>Registro</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='styles.css') }}">

</head>

<body>

    <div class="container">

        <h2>Crear cuenta</h2>

        <!-- ✅ Ruta corregida -->

        <form method="POST"
              action="{{ url_for('auth.registro') }}">

            <input type="text"
                   name="nombre"
                   placeholder="Nombre"
                   required>

            <br>

            <input type="email"
                   name="email"
                   placeholder="Correo"
                   required>

            <br>

            <input type="password"
                   name="password"
                   placeholder="Contraseña"
                   required>

            <br>

            <button type="submit">
                Registrarse
            </button>

        </form>

        <p>

            ¿Ya tienes cuenta?

            <!-- ✅ Ruta corregida -->

            <a href="{{ url_for('auth.login') }}">

                Inicia sesión

            </a>

        </p>

    </div>

</body>

</html>
