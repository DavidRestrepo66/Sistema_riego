{% extends "auth_base.html" %}
{% block title %}Crear cuenta{% endblock %}

{% block auth_content %}
  <h2>Crear cuenta</h2>
  <p class="lead">Únete para empezar a monitorear tus zonas de cultivo.</p>

  <form method="POST" action="{{ url_for('auth.registro') }}">
    <div class="form-field">
      <label class="form-label" for="nombre">Nombre completo</label>
      <input class="form-input" id="nombre" type="text" name="nombre"
             placeholder="David Restrepo" autocomplete="name" required>
    </div>

    <div class="form-field">
      <label class="form-label" for="email">Correo</label>
      <input class="form-input" id="email" type="email" name="email"
             placeholder="tu@correo.com" autocomplete="email" required>
    </div>

    <div class="form-field">
      <label class="form-label" for="password">Contraseña</label>
      <input class="form-input" id="password" type="password" name="password"
             placeholder="mínimo 8 caracteres" autocomplete="new-password"
             minlength="8" required>
      <span class="form-help">Usa al menos 8 caracteres con letras y números.</span>
    </div>

    <button class="btn btn-primary btn-lg btn-full" type="submit" style="margin-top:6px;">
      Crear cuenta
    </button>
  </form>

  <p class="footer-link">
    ¿Ya tienes cuenta?
    <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
  </p>
{% endblock %}
